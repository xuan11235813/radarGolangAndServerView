<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAN Bus 2D Point Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a2e;
            color: #eee;
            display: flex;
            flex-direction: column;
        }

        .header {
            background-color: #16213e;
            padding: 10px 20px;
            text-align: center;
            border-bottom: 2px solid #0f3460;
            flex-shrink: 0;
        }

        .header h1 {
            color: #e94560;
            font-size: 1.4rem;
        }

        .status-bar {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 5px;
            font-size: 0.85rem;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #666;
        }

        .status-dot.connected {
            background-color: #4ade80;
            box-shadow: 0 0 10px #4ade80;
        }

        .status-dot.disconnected {
            background-color: #ef4444;
            box-shadow: 0 0 10px #ef4444;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 8px;
            background-color: #16213e;
            flex-shrink: 0;
        }

        .control-btn {
            padding: 6px 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        .control-btn.primary {
            background-color: #e94560;
            color: white;
        }

        .control-btn.primary:hover {
            background-color: #ff6b8a;
        }

        .control-btn.secondary {
            background-color: #0f3460;
            color: #eee;
        }

        .control-btn.secondary:hover {
            background-color: #1a4a7a;
        }

        .container {
            display: flex;
            flex-wrap: nowrap;
            justify-content: flex-start;
            align-content: flex-start;
            gap: 10px;
            padding: 10px;
            flex: 1;
            overflow-x: auto;
            overflow-y: hidden;
        }

        .tracking-column {
            background-color: #16213e;
            border-radius: 8px;
            padding: 8px;
            border: 1px solid #0f3460;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            width: 600px;
            height: calc(100vh - 120px);
        }

        .tracking-header {
            font-size: 1rem;
            font-weight: bold;
            color: #e94560;
            padding-bottom: 5px;
            border-bottom: 1px solid #0f3460;
            margin-bottom: 8px;
        }

        .tracked-targets-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.75rem;
            margin-bottom: 8px;
        }

        .tracked-targets-table th {
            background-color: #0f3460;
            padding: 6px 4px;
            text-align: center;
            color: #4ade80;
            font-weight: bold;
        }

        .tracked-targets-table td {
            padding: 5px 4px;
            text-align: center;
            border-bottom: 1px solid #0f3460;
        }

        .tracked-targets-table tr:hover {
            background-color: #1a1a3e;
        }

        .canvas-3d-container {
            position: relative;
            background-color: #0f0f23;
            border-radius: 6px;
            overflow: hidden;
            flex: 0 0 auto;
            height: 500px;
            width: 100%;
        }

        .device-column {
            background-color: #16213e;
            border-radius: 8px;
            padding: 8px;
            border: 1px solid #0f3460;
            display: flex;
            flex-direction: column;
            flex: 1 1 0;
            min-width: 300px;
            max-width: calc((100vh - 180px) * 0.5 + 70px);
            height: calc(100vh - 120px);
        }

        .device-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
            padding-bottom: 5px;
            border-bottom: 1px solid #0f3460;
            flex-shrink: 0;
        }

        .device-name {
            font-size: 1rem;
            font-weight: bold;
            color: #e94560;
        }

        .device-status {
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 4px;
            background-color: #333;
        }

        .device-status.connected {
            background-color: #166534;
            color: #4ade80;
        }

        .device-status.disconnected {
            background-color: #7f1d1d;
            color: #fca5a5;
        }

        .canvas-container {
            position: relative;
            background-color: #0f0f23;
            border-radius: 6px;
            overflow: hidden;
            flex: 1;
            min-height: 500px;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .point-info {
            margin-top: 8px;
            font-size: 0.8rem;
            color: #aaa;
            flex-shrink: 0;
        }

        .point-count {
            color: #4ade80;
            font-weight: bold;
        }

        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 200px;
            font-size: 1.2rem;
            color: #666;
        }

        .error-message {
            background-color: #7f1d1d;
            color: #fca5a5;
            padding: 20px;
            text-align: center;
            border-radius: 8px;
            margin: 20px;
        }
    </style>
</head>

<body>
    <div class="header">
        <h1>同济大学低空测试</h1>
        <div class="status-bar">
            <div class="status-item">
                <span>Server:</span>
                <span id="server-status-dot" class="status-dot"></span>
                <span id="server-status-text">Connecting...</span>
            </div>
            <div class="status-item">
                <span>Devices:</span>
                <span id="device-count">0</span>
            </div>
        </div>
    </div>

    <div class="controls">
        <button class="control-btn secondary" onclick="toggleGrid()">Toggle Grid</button>
        <button class="control-btn secondary" onclick="toggleAxes()">Toggle Axes</button>
        <button class="control-btn secondary" onclick="clearAllPoints()">Clear Points</button>
        <button class="control-btn secondary" onclick="resetZoom()">Reset Zoom</button>
        <button class="control-btn primary" onclick="resetAll()">Reset All</button>
        <button class="control-btn primary" onclick="reconnectAll()">Reconnect All</button>
    </div>

    <div id="container" class="container">
        <!-- Tracking column will be inserted here -->
        <div class="loading">Loading configuration...</div>
    </div>

    <script>
        // Configuration
        const WS_PORT = 1999;
        const WS_HOST = window.location.hostname || 'localhost';
        const CONFIG_URL = 'config.json';

        // State
        let devices = [];
        let deviceConnections = {};
        let showGrid = true;
        let showAxes = true;

        // Default axis ranges
        const DEFAULT_LONGITUDE_MIN = 0;
        const DEFAULT_LONGITUDE_MAX = 200;
        const DEFAULT_LATITUDE_MIN = -50;
        const DEFAULT_LATITUDE_MAX = 50;

        // Per-device axis ranges (can be modified by zoom)
        let deviceViewStates = {};

        // Store last points for each device (for redrawing on zoom)
        let devicePoints = {};

        // Initialize device view state
        function initDeviceViewState(deviceName) {
            deviceViewStates[deviceName] = {
                longitudeMin: DEFAULT_LONGITUDE_MIN,
                longitudeMax: DEFAULT_LONGITUDE_MAX,
                latitudeMin: DEFAULT_LATITUDE_MIN,
                latitudeMax: DEFAULT_LATITUDE_MAX,
                isDragging: false,
                dragStartX: 0,
                dragStartY: 0,
                dragStartLongMin: 0,
                dragStartLongMax: 0,
                dragStartLatMin: 0,
                dragStartLatMax: 0
            };
        }

        // Colors
        const COLORS = {
            background: '#0f0f23',
            grid: '#1a1a3e',
            axes: '#3a3a5e',
            point: '#e94560',
            pointGlow: 'rgba(233, 69, 96, 0.3)',
            text: '#aaa'
        };

        // Fetch configuration
        async function loadConfig() {
            try {
                const response = await fetch(CONFIG_URL + '?t=' + Date.now()); // Add timestamp to prevent caching
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const config = await response.json();
                devices = config.devices || [];

                console.log('Loaded config:', config);
                console.log('Devices array:', devices);

                if (devices.length === 0) {
                    showError('No devices found in configuration');
                    return;
                }

                document.getElementById('device-count').textContent = devices.length;
                createDeviceColumns();
                connectAllDevices();
            } catch (error) {
                showError(`Failed to load configuration: ${error.message}`);
            }
        }

        function showError(message) {
            const container = document.getElementById('container');
            container.innerHTML = `<div class="error-message">${message}</div>`;
        }

        function createDeviceColumns() {
            const container = document.getElementById('container');
            container.innerHTML = '';

            console.log('Creating device columns for', devices.length, 'devices:', devices);

            // Create device columns first
            devices.forEach((deviceName, index) => {
                console.log(`Creating column ${index} for device: ${deviceName}`);
                const column = document.createElement('div');
                column.className = 'device-column';
                column.id = `device-${deviceName}`;
                column.innerHTML = `
                    <div class="device-header">
                        <span class="device-name">${deviceName}</span>
                        <span class="device-status disconnected" id="status-${deviceName}">Disconnected</span>
                    </div>
                    <div class="canvas-container">
                        <canvas id="canvas-${deviceName}"></canvas>
                    </div>
                    <div class="point-info">
                        Points: <span class="point-count" id="count-${deviceName}">0</span>
                        <span id="last-update-${deviceName}"></span>
                    </div>
                `;
                container.appendChild(column);
                console.log(`Appended column for ${deviceName}, container now has ${container.children.length} children`);

                // Initialize canvas
                initCanvas(deviceName);
            });

            // Create tracking column on the right
            const trackingColumn = document.createElement('div');
            trackingColumn.className = 'tracking-column';
            trackingColumn.innerHTML = `
                <div class="tracking-header">Tracked Targets</div>
                <table class="tracked-targets-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>X</th>
                            <th>Y</th>
                            <th>Z</th>
                            <th>RCS</th>
                        </tr>
                    </thead>
                    <tbody id="tracked-targets-body">
                        <tr id="target-row-1">
                            <td>1</td>
                            <td id="target-1-x">20.0</td>
                            <td id="target-1-y">20.0</td>
                            <td id="target-1-z">100.0</td>
                            <td id="target-1-rcs">0.5</td>
                        </tr>
                    </tbody>
                </table>
                <div class="canvas-3d-container">
                    <canvas id="canvas-3d"></canvas>
                </div>
            `;
            container.appendChild(trackingColumn);

            // Initialize 3D canvas
            init3DCanvas();

            // Handle window resize
            window.addEventListener('resize', handleResize);
        }

        function handleResize() {
            devices.forEach(deviceName => {
                resizeCanvas(deviceName);
            });
        }

        function resizeCanvas(deviceName) {
            const canvas = document.getElementById(`canvas-${deviceName}`);
            const container = canvas.parentElement;

            // Set canvas size to match container
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;

            // Redraw
            const ctx = canvas.getContext('2d');
            drawBackground(ctx, canvas.width, canvas.height, deviceName);
        }

        function initCanvas(deviceName) {
            // Initialize view state for this device
            initDeviceViewState(deviceName);

            const canvas = document.getElementById(`canvas-${deviceName}`);

            // Add wheel event listener for zoom
            canvas.addEventListener('wheel', (event) => handleWheel(event, deviceName), { passive: false });

            // Add mouse event listeners for panning
            canvas.addEventListener('mousedown', (event) => handleMouseDown(event, deviceName));
            canvas.addEventListener('mousemove', (event) => handleMouseMove(event, deviceName));
            canvas.addEventListener('mouseup', (event) => handleMouseUp(event, deviceName));
            canvas.addEventListener('mouseleave', (event) => handleMouseUp(event, deviceName));

            // Use requestAnimationFrame to ensure container is rendered
            requestAnimationFrame(() => {
                resizeCanvas(deviceName);
            });
        }

        function handleMouseDown(event, deviceName) {
            if (event.button === 0) { // Left click
                const state = deviceViewStates[deviceName];
                state.isDragging = true;
                state.dragStartX = event.clientX;
                state.dragStartY = event.clientY;
                state.dragStartLongMin = state.longitudeMin;
                state.dragStartLongMax = state.longitudeMax;
                state.dragStartLatMin = state.latitudeMin;
                state.dragStartLatMax = state.latitudeMax;
                event.target.style.cursor = 'grabbing';
            }
        }

        function handleMouseMove(event, deviceName) {
            const state = deviceViewStates[deviceName];
            if (!state.isDragging) return;

            const canvas = event.target;
            const rect = canvas.getBoundingClientRect();
            const mouseX = event.clientX - rect.left;
            const mouseY = event.clientY - rect.top;

            // Calculate margins
            const marginLeft = 50;
            const marginBottom = 40;
            const marginTop = 20;
            const marginRight = 20;

            const plotWidth = canvas.width - marginLeft - marginRight;
            const plotHeight = canvas.height - marginTop - marginBottom;

            const longRange = state.dragStartLongMax - state.dragStartLongMin;
            const latRange = state.dragStartLatMax - state.dragStartLatMin;

            const scaleX = plotWidth / latRange;
            const scaleY = plotHeight / longRange;
            const scale = Math.min(scaleX, scaleY);

            const actualPlotWidth = latRange * scale;
            const actualPlotHeight = longRange * scale;

            const offsetX = marginLeft + (plotWidth - actualPlotWidth) / 2;
            const offsetY = marginTop + (plotHeight - actualPlotHeight) / 2;

            // Calculate pixel delta
            const deltaX = event.clientX - state.dragStartX;
            const deltaY = event.clientY - state.dragStartY;

            // Convert to data coordinates (inverted for Y)
            const dataDeltaX = -deltaX / scale;
            const dataDeltaY = deltaY / scale;

            // Apply pan
            state.longitudeMin = state.dragStartLongMin + dataDeltaY;
            state.longitudeMax = state.dragStartLongMax + dataDeltaY;
            state.latitudeMin = state.dragStartLatMin + dataDeltaX;
            state.latitudeMax = state.dragStartLatMax + dataDeltaX;

            // Redraw only this device
            redrawDevice(deviceName);
        }

        function handleMouseUp(event, deviceName) {
            const state = deviceViewStates[deviceName];
            if (state.isDragging) {
                state.isDragging = false;
                if (event.target) {
                    event.target.style.cursor = 'default';
                }
            }
        }

        function drawBackground(ctx, width, height, deviceName) {
            // Clear canvas
            ctx.fillStyle = COLORS.background;
            ctx.fillRect(0, 0, width, height);

            // Get device-specific view state
            const state = deviceViewStates[deviceName];
            if (!state) return;

            // Calculate margins for labels
            const marginLeft = 50;
            const marginBottom = 40;
            const marginTop = 20;
            const marginRight = 20;

            const plotWidth = width - marginLeft - marginRight;
            const plotHeight = height - marginTop - marginBottom;

            // Calculate scale to ensure equal unit length for both axes (using current zoom)
            const longRange = state.longitudeMax - state.longitudeMin;
            const latRange = state.latitudeMax - state.latitudeMin;

            // Calculate pixels per meter for each axis
            const scaleX = plotWidth / latRange;
            const scaleY = plotHeight / longRange;

            // Use the smaller scale to fit both axes with equal unit length
            const scale = Math.min(scaleX, scaleY);

            // Calculate actual plot dimensions with equal scale
            const actualPlotWidth = latRange * scale;
            const actualPlotHeight = longRange * scale;

            // Center the plot in the available space
            const offsetX = marginLeft + (plotWidth - actualPlotWidth) / 2;
            const offsetY = marginTop + (plotHeight - actualPlotHeight) / 2;

            // Draw grid
            if (showGrid) {
                ctx.strokeStyle = COLORS.grid;
                ctx.lineWidth = 1;

                // Calculate adaptive grid step based on zoom level
                const gridStep = calculateGridStep(scale);

                // Vertical grid lines (latitude)
                const latStart = Math.ceil(state.latitudeMin / gridStep) * gridStep;
                for (let lat = latStart; lat <= state.latitudeMax; lat += gridStep) {
                    const x = offsetX + (lat - state.latitudeMin) * scale;
                    ctx.beginPath();
                    ctx.moveTo(x, offsetY);
                    ctx.lineTo(x, offsetY + actualPlotHeight);
                    ctx.stroke();
                }

                // Horizontal grid lines (longitude)
                const longStart = Math.ceil(state.longitudeMin / gridStep) * gridStep;
                for (let long = longStart; long <= state.longitudeMax; long += gridStep) {
                    const y = offsetY + actualPlotHeight - (long - state.longitudeMin) * scale;
                    ctx.beginPath();
                    ctx.moveTo(offsetX, y);
                    ctx.lineTo(offsetX + actualPlotWidth, y);
                    ctx.stroke();
                }
            }

            // Draw axes
            if (showAxes) {
                ctx.strokeStyle = COLORS.axes;
                ctx.lineWidth = 2;

                // X-axis (bottom of plot)
                ctx.beginPath();
                ctx.moveTo(offsetX, offsetY + actualPlotHeight);
                ctx.lineTo(offsetX + actualPlotWidth, offsetY + actualPlotHeight);
                ctx.stroke();

                // Y-axis (left of plot)
                ctx.beginPath();
                ctx.moveTo(offsetX, offsetY);
                ctx.lineTo(offsetX, offsetY + actualPlotHeight);
                ctx.stroke();

                // Draw scale labels
                ctx.fillStyle = COLORS.text;
                ctx.font = '11px Arial';

                // Calculate adaptive label step
                const labelStep = calculateLabelStep(scale);

                // X-axis labels (Latitude)
                ctx.textAlign = 'center';
                const latLabelStart = Math.ceil(state.latitudeMin / labelStep) * labelStep;
                for (let lat = latLabelStart; lat <= state.latitudeMax; lat += labelStep) {
                    const x = offsetX + (lat - state.latitudeMin) * scale;
                    ctx.fillText(`${lat.toFixed(0)}m`, x, offsetY + actualPlotHeight + 15);
                }
                ctx.fillText('Latitude', offsetX + actualPlotWidth / 2, height - 5);

                // Y-axis labels (Longitude)
                ctx.textAlign = 'right';
                const longLabelStart = Math.ceil(state.longitudeMin / labelStep) * labelStep;
                for (let long = longLabelStart; long <= state.longitudeMax; long += labelStep) {
                    const y = offsetY + actualPlotHeight - (long - state.longitudeMin) * scale;
                    ctx.fillText(`${long.toFixed(0)}m`, offsetX - 5, y + 4);
                }

                // Y-axis title
                ctx.save();
                ctx.translate(12, offsetY + actualPlotHeight / 2);
                ctx.rotate(-Math.PI / 2);
                ctx.textAlign = 'center';
                ctx.fillText('Longitude', 0, 0);
                ctx.restore();
            }
        }

        // Calculate grid step based on zoom scale
        function calculateGridStep(scale) {
            const pixelsPer1m = 1 * scale;
            if (pixelsPer1m >= 20) return 1;
            if (pixelsPer1m >= 10) return 2;
            if (pixelsPer1m >= 5) return 5;
            if (pixelsPer1m >= 2.5) return 10;
            if (pixelsPer1m >= 1) return 20;
            if (pixelsPer1m >= 0.5) return 50;
            return 100;
        }

        // Calculate label step based on zoom scale
        function calculateLabelStep(scale) {
            const pixelsPer1m = 1 * scale;
            if (pixelsPer1m >= 20) return 2;
            if (pixelsPer1m >= 10) return 5;
            if (pixelsPer1m >= 5) return 10;
            if (pixelsPer1m >= 2) return 20;
            if (pixelsPer1m >= 1) return 50;
            if (pixelsPer1m >= 0.5) return 100;
            return 200;
        }

        function drawPoints(deviceName, points) {
            // Store points for this device (for redrawing on zoom)
            devicePoints[deviceName] = points;

            const canvas = document.getElementById(`canvas-${deviceName}`);
            const ctx = canvas.getContext('2d');
            const width = canvas.width;
            const height = canvas.height;

            // Get device-specific view state
            const state = deviceViewStates[deviceName];
            if (!state) return;

            // Calculate margins (same as drawBackground)
            const marginLeft = 50;
            const marginBottom = 40;
            const marginTop = 20;
            const marginRight = 20;

            const plotWidth = width - marginLeft - marginRight;
            const plotHeight = height - marginTop - marginBottom;

            // Calculate scale to ensure equal unit length for both axes (using current zoom)
            const longRange = state.longitudeMax - state.longitudeMin;
            const latRange = state.latitudeMax - state.latitudeMin;

            const scaleX = plotWidth / latRange;
            const scaleY = plotHeight / longRange;
            const scale = Math.min(scaleX, scaleY);

            const actualPlotWidth = latRange * scale;
            const actualPlotHeight = longRange * scale;

            const offsetX = marginLeft + (plotWidth - actualPlotWidth) / 2;
            const offsetY = marginTop + (plotHeight - actualPlotHeight) / 2;

            // Clear and redraw background
            drawBackground(ctx, width, height, deviceName);

            // Draw points
            points.forEach(point => {
                // Convert coordinates using equal scale
                // Longitude (distLong) is vertical: 0 at bottom, 200 at top
                // Latitude (distLat) is horizontal: -50 at left, 50 at right

                const x = offsetX + (point.distLat - state.latitudeMin) * scale;
                const y = offsetY + actualPlotHeight - (point.distLong - state.longitudeMin) * scale;

                // Skip points outside the visible area
                if (x < offsetX || x > offsetX + actualPlotWidth ||
                    y < offsetY || y > offsetY + actualPlotHeight) {
                    return;
                }

                // Draw glow
                ctx.beginPath();
                ctx.arc(x, y, 8, 0, Math.PI * 2);
                ctx.fillStyle = COLORS.pointGlow;
                ctx.fill();

                // Draw point
                ctx.beginPath();
                ctx.arc(x, y, 4, 0, Math.PI * 2);
                ctx.fillStyle = COLORS.point;
                ctx.fill();
            });

            // Update point count
            document.getElementById(`count-${deviceName}`).textContent = points.length;

            // Update timestamp
            const now = new Date();
            document.getElementById(`last-update-${deviceName}`).textContent =
                ` | Last: ${now.toLocaleTimeString()}`;
        }

        // Redraw a single device with current zoom
        function redrawDevice(deviceName) {
            if (devicePoints[deviceName]) {
                drawPoints(deviceName, devicePoints[deviceName]);
            } else {
                // Just redraw background if no points
                const canvas = document.getElementById(`canvas-${deviceName}`);
                if (canvas) {
                    const ctx = canvas.getContext('2d');
                    drawBackground(ctx, canvas.width, canvas.height, deviceName);
                }
            }
        }

        // Redraw all devices with current zoom
        function redrawAllDevices() {
            devices.forEach(deviceName => {
                redrawDevice(deviceName);
            });
        }

        // Zoom handling
        function handleWheel(event, deviceName) {
            event.preventDefault();

            const state = deviceViewStates[deviceName];
            if (!state) return;

            const canvas = document.getElementById(`canvas-${deviceName}`);
            const rect = canvas.getBoundingClientRect();
            const mouseX = event.clientX - rect.left;
            const mouseY = event.clientY - rect.top;

            // Calculate margins
            const marginLeft = 50;
            const marginBottom = 40;
            const marginTop = 20;
            const marginRight = 20;

            const plotWidth = canvas.width - marginLeft - marginRight;
            const plotHeight = canvas.height - marginTop - marginBottom;

            const longRange = state.longitudeMax - state.longitudeMin;
            const latRange = state.latitudeMax - state.latitudeMin;

            const scaleX = plotWidth / latRange;
            const scaleY = plotHeight / longRange;
            const scale = Math.min(scaleX, scaleY);

            const actualPlotWidth = latRange * scale;
            const actualPlotHeight = longRange * scale;

            const offsetX = marginLeft + (plotWidth - actualPlotWidth) / 2;
            const offsetY = marginTop + (plotHeight - actualPlotHeight) / 2;

            // Convert mouse position to data coordinates
            const mouseLat = state.latitudeMin + (mouseX - offsetX) / scale;
            const mouseLong = state.longitudeMin + (actualPlotHeight - (mouseY - offsetY)) / scale;

            // Zoom factor
            const zoomFactor = event.deltaY > 0 ? 1.2 : 0.8;

            // Calculate new ranges centered on mouse position
            const newLongRange = (state.longitudeMax - state.longitudeMin) * zoomFactor;
            const newLatRange = (state.latitudeMax - state.latitudeMin) * zoomFactor;

            // Limit zoom (don't zoom in too much or out too much)
            const minRange = 5;  // minimum 5m range
            const maxLongRange = DEFAULT_LONGITUDE_MAX - DEFAULT_LONGITUDE_MIN;
            const maxLatRange = DEFAULT_LATITUDE_MAX - DEFAULT_LATITUDE_MIN;

            if (newLongRange < minRange || newLatRange < minRange) return;
            if (newLongRange > maxLongRange * 2 || newLatRange > maxLatRange * 2) return;

            // Calculate new bounds centered on mouse position
            const longRatio = (mouseLong - state.longitudeMin) / (state.longitudeMax - state.longitudeMin);
            const latRatio = (mouseLat - state.latitudeMin) / (state.latitudeMax - state.latitudeMin);

            state.longitudeMin = mouseLong - newLongRange * longRatio;
            state.longitudeMax = mouseLong + newLongRange * (1 - longRatio);
            state.latitudeMin = mouseLat - newLatRange * latRatio;
            state.latitudeMax = mouseLat + newLatRange * (1 - latRatio);

            // Redraw only this device
            redrawDevice(deviceName);
        }

        // Reset zoom to default for all devices
        function resetZoom() {
            devices.forEach(deviceName => {
                const state = deviceViewStates[deviceName];
                if (state) {
                    state.longitudeMin = DEFAULT_LONGITUDE_MIN;
                    state.longitudeMax = DEFAULT_LONGITUDE_MAX;
                    state.latitudeMin = DEFAULT_LATITUDE_MIN;
                    state.latitudeMax = DEFAULT_LATITUDE_MAX;
                }
            });
            redrawAllDevices();
        }

        function connectDevice(deviceName) {
            const wsUrl = `ws://${WS_HOST}:${WS_PORT}/${deviceName}`;

            // Close existing connection if any
            if (deviceConnections[deviceName]) {
                deviceConnections[deviceName].close();
            }

            try {
                const ws = new WebSocket(wsUrl);
                deviceConnections[deviceName] = ws;

                ws.onopen = () => {
                    console.log(`Connected to ${deviceName}`);
                    updateDeviceStatus(deviceName, true);
                    updateServerStatus(true);
                };

                ws.onmessage = (event) => {
                    try {
                        const points = JSON.parse(event.data);
                        drawPoints(deviceName, points);
                    } catch (error) {
                        console.error(`Error parsing message for ${deviceName}:`, error);
                    }
                };

                ws.onclose = () => {
                    console.log(`Disconnected from ${deviceName}`);
                    updateDeviceStatus(deviceName, false);

                    // Attempt to reconnect after 3 seconds
                    setTimeout(() => {
                        if (deviceConnections[deviceName] === ws) {
                            console.log(`Attempting to reconnect ${deviceName}...`);
                            connectDevice(deviceName);
                        }
                    }, 3000);
                };

                ws.onerror = (error) => {
                    console.error(`WebSocket error for ${deviceName}:`, error);
                };
            } catch (error) {
                console.error(`Failed to connect to ${deviceName}:`, error);
                updateDeviceStatus(deviceName, false);
            }
        }

        function connectAllDevices() {
            devices.forEach(deviceName => {
                connectDevice(deviceName);
            });
        }

        function updateDeviceStatus(deviceName, connected) {
            const statusEl = document.getElementById(`status-${deviceName}`);
            if (statusEl) {
                statusEl.textContent = connected ? 'Connected' : 'Disconnected';
                statusEl.className = `device-status ${connected ? 'connected' : 'disconnected'}`;
            }
        }

        function updateServerStatus(connected) {
            const dotEl = document.getElementById('server-status-dot');
            const textEl = document.getElementById('server-status-text');

            if (connected) {
                dotEl.className = 'status-dot connected';
                textEl.textContent = 'Connected';
            } else {
                dotEl.className = 'status-dot disconnected';
                textEl.textContent = 'Disconnected';
            }
        }

        function toggleGrid() {
            showGrid = !showGrid;
            devices.forEach(deviceName => {
                redrawDevice(deviceName);
            });
        }

        function toggleAxes() {
            showAxes = !showAxes;

                redrawDevice(deviceName);
            });

        function clearAllPoints() {

        function resetAll() {
            // Reset zoom for all devices
            devices.forEach(deviceName => {
                const state = deviceViewStates[deviceName];
                if (state) {
                    state.longitudeMin = DEFAULT_LONGITUDE_MIN;
                    state.longitudeMax = DEFAULT_LONGITUDE_MAX;
                    state.latitudeMin = DEFAULT_LATITUDE_MIN;

                }

        function reconnectAll() {
            devices.forEach(deviceName => {
                if (deviceConnections[deviceName]) {
                    deviceConnections[deviceName].close();
                }
            });
            setTimeout(connectAllDevices, 500);
        }

        // ============ 3D Canvas and Simulation ============

        // 3D view state
        let view3D = {
            rotationX: 0.5,  // Pitch (radians) - 0 = side view (X-Y plane as line), PI/2 = top view (Z as point)
            rotationY: 0.5,   // Yaw (radians)
            offsetY: 0,       // Vertical offset for panning
            isDragging: false,
            isPanning: false, // Middle button panning
            lastMouseX: 0,
            lastMouseY: 0
        };

        // Random flying target simulation
        let simulation = {
            target: {
                id: 1,
                x: 0,
                y: 0,
                z: 100,
                rcs: 0.5
            },
            // Velocity for smooth movement
            vx: 0,
            vy: 0,
            vz: 0,
            // Target position to fly towards
            targetX: 0,
            targetY: 0,
            targetZ: 100,
            // Bounds
            minX: -30, maxX: 30,
            minY: -30, maxY: 30,
            minZ: 5, maxZ: 200,
            // Movement parameters
            speed: 0.05,  // 10x slower
            directionChangeInterval: 3000,  // Change direction every 3 seconds
            lastDirectionChange: 0,
            animationId: null,
            // Trail for visualization (30 seconds at ~60fps = 1800 positions)
            trail: [],
            maxTrailLength: 1800
        };

        // Initialize random target position
        function initRandomTarget() {
            simulation.target.x = (Math.random() - 0.5) * 40;
            simulation.target.y = (Math.random() - 0.5) * 40;
            simulation.target.z = 50 + Math.random() * 100;
            simulation.target.rcs = 0.3 + Math.random() * 0.4;

            // Set initial velocity
            simulation.vx = (Math.random() - 0.5) * 2;
            simulation.vy = (Math.random() - 0.5) * 2;
            simulation.vz = (Math.random() - 0.5) * 1;

            setNewRandomTarget();
        }

        // Set a new random target position to fly towards
        function setNewRandomTarget() {
            simulation.targetX = simulation.minX + Math.random() * (simulation.maxX - simulation.minX);
            simulation.targetY = simulation.minY + Math.random() * (simulation.maxY - simulation.minY);
            simulation.targetZ = simulation.minZ + Math.random() * (simulation.maxZ - simulation.minZ);
        }

        // Update target position with smooth random movement
        function updateRandomTarget() {
            const now = Date.now();

            // Add current position to trail before updating
            simulation.trail.push({
                x: simulation.target.x,
                y: simulation.target.y,
                z: simulation.target.z
            });

            // Limit trail length
            if (simulation.trail.length > simulation.maxTrailLength) {
                simulation.trail.shift();
            }

            // Change direction periodically
            if (now - simulation.lastDirectionChange > simulation.directionChangeInterval) {
                setNewRandomTarget();
                simulation.lastDirectionChange = now;
            }

            // Calculate direction to target
            const dx = simulation.targetX - simulation.target.x;
            const dy = simulation.targetY - simulation.target.y;
            const dz = simulation.targetZ - simulation.target.z;

            // Smoothly adjust velocity towards target (10x slower)
            simulation.vx += dx * 0.0001;
            simulation.vy += dy * 0.0001;
            simulation.vz += dz * 0.0001;

            // Add some random noise for more natural movement (10x slower)
            simulation.vx += (Math.random() - 0.5) * 0.01;
            simulation.vy += (Math.random() - 0.5) * 0.01;
            simulation.vz += (Math.random() - 0.5) * 0.005;

            // Limit velocity (10x slower)
            const maxV = 0.15;
            simulation.vx = Math.max(-maxV, Math.min(maxV, simulation.vx));
            simulation.vy = Math.max(-maxV, Math.min(maxV, simulation.vy));
            simulation.vz = Math.max(-maxV * 0.5, Math.min(maxV * 0.5, simulation.vz));

            // Update position
            simulation.target.x += simulation.vx;
            simulation.target.y += simulation.vy;
            simulation.target.z += simulation.vz;

            // Bounce off boundaries
            if (simulation.target.x < simulation.minX || simulation.target.x > simulation.maxX) {
                simulation.vx *= -0.8;
                simulation.target.x = Math.max(simulation.minX, Math.min(simulation.maxX, simulation.target.x));
                setNewRandomTarget();
            }
            if (simulation.target.y < simulation.minY || simulation.target.y > simulation.maxY) {
                simulation.vy *= -0.8;
                simulation.target.y = Math.max(simulation.minY, Math.min(simulation.maxY, simulation.target.y));
                setNewRandomTarget();
            }
            if (simulation.target.z < simulation.minZ || simulation.target.z > simulation.maxZ) {
                simulation.vz *= -0.8;
                simulation.target.z = Math.max(simulation.minZ, Math.min(simulation.maxZ, simulation.target.z));
                setNewRandomTarget();
            }

            // Update RCS with slight variation
            simulation.target.rcs = 0.3 + Math.random() * 0.4;
        }

        // 3D canvas initialization
        function init3DCanvas() {
            const canvas = document.getElementById('canvas-3d');
            const container = canvas.parentElement;

            // Set canvas size
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;

            // Mouse events for rotation and panning
            canvas.addEventListener('mousedown', handle3DMouseDown);
            canvas.addEventListener('mousemove', handle3DMouseMove);
            canvas.addEventListener('mouseup', handle3DMouseUp);
            canvas.addEventListener('mouseleave', handle3DMouseUp);
            canvas.addEventListener('contextmenu', (e) => e.preventDefault());  // Prevent context menu

            // Prevent default middle button scroll behavior
            canvas.addEventListener('auxclick', (e) => {
                if (e.button === 1) e.preventDefault();
            });

            // Initialize and start random target simulation
            initRandomTarget();
            startRandomSimulation();

            // Initial draw
            draw3DScene();
        }

        // Animation loop for random flying target
        function startRandomSimulation() {
            function animate() {
                updateRandomTarget();
                updateTargetTable();
                draw3DScene();
                simulation.animationId = requestAnimationFrame(animate);
            }
            animate();
        }

        function handle3DMouseDown(event) {
            if (event.button === 0) {
                // Left button - rotation
                view3D.isDragging = true;
                view3D.lastMouseX = event.clientX;
                view3D.lastMouseY = event.clientY;
                event.target.style.cursor = 'grabbing';
            } else if (event.button === 1) {
                // Middle button - pan vertical
                view3D.isPanning = true;
                view3D.lastMouseY = event.clientY;
                event.target.style.cursor = 'ns-resize';
                event.preventDefault();  // Prevent default middle button behavior
            }
        }

        function handle3DMouseMove(event) {
            if (view3D.isDragging) {
                // Rotation with left button
                const deltaX = event.clientX - view3D.lastMouseX;
                const deltaY = event.clientY - view3D.lastMouseY;

                view3D.rotationY += deltaX * 0.01;
                view3D.rotationX += deltaY * 0.01;

                // Clamp rotation:
                // - Lower limit (0): X-Y plane becomes a line (side view)
                // - Upper limit (PI/2): Z axis becomes a point (top view)
                // Allow reaching exactly 0 for side view, leave small margin for top view
                view3D.rotationX = Math.max(0, Math.min(Math.PI / 2 - 0.02, view3D.rotationX));

                view3D.lastMouseX = event.clientX;
                view3D.lastMouseY = event.clientY;

                draw3DScene();
            } else if (view3D.isPanning) {
                // Vertical panning with middle button
                const deltaY = event.clientY - view3D.lastMouseY;
                view3D.offsetY += deltaY;

                view3D.lastMouseY = event.clientY;
                draw3DScene();
            }
        }

        function handle3DMouseUp(event) {
            if (view3D.isDragging) {
                view3D.isDragging = false;
                if (event.target) {
                    event.target.style.cursor = 'grab';
                }
            }
            if (view3D.isPanning) {
                view3D.isPanning = false;
                if (event.target) {
                    event.target.style.cursor = 'grab';
                }
            }
        }

        // 3D projection functions
        // rotationX: 0 = side view (X-Y plane as line), PI/2 = top view (Z axis as point)
        function project3D(x, y, z, canvas) {
            // Center of the view with vertical offset for panning
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2 + view3D.offsetY;

            // Scale factors - same for X and Y to maintain orthogonal grid
            const scaleXY = Math.min(canvas.width, canvas.height) / 150;  // X and Y scale (equal)
            const scaleZ = Math.min(canvas.width, canvas.height) / 300;   // Z scale (denser, for higher altitudes)

            // rotationX controls the view angle from side (0) to top (PI/2)
            // At rotationX = 0: looking from the side, X-Y plane appears as a line
            // At rotationX = PI/2: looking from above, Z axis appears as a point
            const angle = view3D.rotationX;
            const cosA = Math.cos(angle);
            const sinA = Math.sin(angle);

            // rotationY controls the rotation around Z axis (yaw)
            const cosY = Math.cos(view3D.rotationY);
            const sinY = Math.sin(view3D.rotationY);

            // First rotate around Z axis (yaw) - this rotates the X-Y plane
            let x1 = x * cosY - y * sinY;
            let y1 = x * sinY + y * cosY;
            let z1 = z;

            // Then apply the view angle rotation
            // This tilts the view from side (angle=0) to top (angle=PI/2)
            // At angle=0: we see X and Z (Y is collapsed)
            // At angle=PI/2: we see X and Y (Z is collapsed)
            let x2 = x1;
            let y2 = y1 * cosA + z1 * sinA;  // Y component in view
            let z2 = -y1 * sinA + z1 * cosA; // Z component (depth)

            // Orthographic-like projection with slight perspective
            const perspective = 500;
            const factor = perspective / (perspective + z2 * 0.3);

            // Project to 2D
            // At angle=0: x2 maps to screen X, y2 maps to screen Y (shows X-Z plane)
            // At angle=PI/2: x2 maps to screen X, y2 maps to screen Y (shows X-Y plane)
            const projectedX = centerX + x2 * scaleXY * factor;
            const projectedY = centerY - y2 * scaleXY * factor;

            return {
                x: projectedX,
                y: projectedY,
                z: z2
            };
        }

        // Draw 3D scene
        function draw3DScene() {
            const canvas = document.getElementById('canvas-3d');
            if (!canvas) return;

            const ctx = canvas.getContext('2d');
            const width = canvas.width;
            const height = canvas.height;

            // Clear canvas
            ctx.fillStyle = COLORS.background;
            ctx.fillRect(0, 0, width, height);

            // Draw grid on X-Y plane at Z=0 (bottom)
            draw3DGrid(ctx, canvas);

            // Draw 3D axes
            draw3DAxes(ctx, canvas);

            // Draw Z axis markers
            draw3DZMarkers(ctx, canvas);

            // Draw target (drone)
            draw3DTarget(ctx, canvas);
        }

        function draw3DAxes(ctx, canvas) {
            const axisLengthXY = 60;
            const axisLengthZ = 200;

            // Origin
            const origin = project3D(0, 0, 0, canvas);

            // X axis (red)
            const xEnd = project3D(axisLengthXY, 0, 0, canvas);
            ctx.strokeStyle = '#ef4444';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(origin.x, origin.y);
            ctx.lineTo(xEnd.x, xEnd.y);
            ctx.stroke();

            // X label
            ctx.fillStyle = '#ef4444';
            ctx.font = '12px Arial';
            ctx.fillText('X', xEnd.x + 5, xEnd.y);

            // Y axis (green)
            const yEnd = project3D(0, axisLengthXY, 0, canvas);
            ctx.strokeStyle = '#4ade80';
            ctx.beginPath();
            ctx.moveTo(origin.x, origin.y);
            ctx.lineTo(yEnd.x, yEnd.y);
            ctx.stroke();

            // Y label
            ctx.fillStyle = '#4ade80';
            ctx.fillText('Y', yEnd.x + 5, yEnd.y);

            // Z axis (blue) - pointing up
            const zEnd = project3D(0, 0, axisLengthZ, canvas);
            ctx.strokeStyle = '#60a5fa';
            ctx.beginPath();
            ctx.moveTo(origin.x, origin.y);
            ctx.lineTo(zEnd.x, zEnd.y);
            ctx.stroke();

            // Z label
            ctx.fillStyle = '#60a5fa';
            ctx.fillText('Z', zEnd.x + 5, zEnd.y);
        }

        function draw3DGrid(ctx, canvas) {
            ctx.strokeStyle = '#1a1a3e';
            ctx.lineWidth = 1;

            // Draw grid lines on X-Y plane at Z=0 (bottom surface)
            // Grid from -60 to 60 to match larger axis
            for (let i = -60; i <= 60; i += 20) {
                // Lines parallel to X axis
                const start1 = project3D(-60, i, 0, canvas);
                const end1 = project3D(60, i, 0, canvas);
                ctx.beginPath();
                ctx.moveTo(start1.x, start1.y);
                ctx.lineTo(end1.x, end1.y);
                ctx.stroke();

                // Lines parallel to Y axis
                const start2 = project3D(i, -60, 0, canvas);
                const end2 = project3D(i, 60, 0, canvas);
                ctx.beginPath();
                ctx.moveTo(start2.x, start2.y);
                ctx.lineTo(end2.x, end2.y);
                ctx.stroke();
            }
        }

        function draw3DZMarkers(ctx, canvas) {
            ctx.strokeStyle = '#1a1a3e';
            ctx.lineWidth = 1;

            // Draw Z axis markers with denser measures
            // Every 20m for 0-100, every 50m for 100-250
            const zMarkers = [0, 20, 40, 60, 80, 100, 150, 200, 250];

            for (const z of zMarkers) {
                // Draw horizontal tick mark
                const start = project3D(-3, 0, z, canvas);
                const end = project3D(3, 0, z, canvas);
                ctx.beginPath();
                ctx.moveTo(start.x, start.y);
                ctx.lineTo(end.x, end.y);
                ctx.stroke();

                // Z value label
                ctx.fillStyle = '#666';
                ctx.font = '10px Arial';
                const labelPos = project3D(-5, 0, z, canvas);
                ctx.fillText(z.toString() + 'm', labelPos.x - 25, labelPos.y);
            }
        }

        function draw3DTarget(ctx, canvas) {
            const target = simulation.target;
            const pos = project3D(target.x, target.y, target.z, canvas);

            // Draw trail (last 50 positions)
            if (simulation.trail && simulation.trail.length > 1) {
                ctx.strokeStyle = 'rgba(233, 69, 96, 0.4)';
                ctx.lineWidth = 2;
                ctx.beginPath();

                for (let i = 0; i < simulation.trail.length; i++) {
                    const trailPos = project3D(
                        simulation.trail[i].x,
                        simulation.trail[i].y,
                        simulation.trail[i].z,
                        canvas
                    );

                    if (i === 0) {
                        ctx.moveTo(trailPos.x, trailPos.y);
                    } else {
                        ctx.lineTo(trailPos.x, trailPos.y);
                    }
                }
                ctx.stroke();
            }

            // Draw realistic drone
            drawDrone(ctx, pos.x, pos.y, target.z);
        }

        // Draw a more realistic drone
        function drawDrone(ctx, x, y, altitude) {
            const time = Date.now();
            const propellerSpeed = altitude > 0 ? 0.3 : 0.05;  // Faster propellers when flying

            // Drone body (central hub)
            ctx.fillStyle = '#2a2a4a';
            ctx.beginPath();
            ctx.ellipse(x, y, 8, 6, 0, 0, Math.PI * 2);
            ctx.fill();

            // Drone body outline
            ctx.strokeStyle = '#4a4a6a';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.ellipse(x, y, 8, 6, 0, 0, Math.PI * 2);
            ctx.stroke();

            // Four arms and propellers
            const armLength = 14;
            const armAngles = [Math.PI / 4, 3 * Math.PI / 4, 5 * Math.PI / 4, 7 * Math.PI / 4];  // X configuration

            for (let i = 0; i < 4; i++) {
                const armAngle = armAngles[i];
                const motorX = x + Math.cos(armAngle) * armLength;
                const motorY = y + Math.sin(armAngle) * armLength * 0.7;  // Slightly flattened perspective

                // Draw arm
                ctx.strokeStyle = '#3a3a5a';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(x, y);
                ctx.lineTo(motorX, motorY);
                ctx.stroke();

                // Motor housing
                ctx.fillStyle = '#1a1a3a';
                ctx.beginPath();
                ctx.arc(motorX, motorY, 3, 0, Math.PI * 2);
                ctx.fill();

                // Propeller disc (spinning effect)
                const propAngle = time * propellerSpeed + i * Math.PI / 2;
                ctx.strokeStyle = 'rgba(100, 200, 255, 0.4)';
                ctx.lineWidth = 1;

                // Draw propeller blades
                for (let b = 0; b < 2; b++) {
                    const bladeAngle = propAngle + b * Math.PI;
                    const bladeLen = 8;
                    ctx.beginPath();
                    ctx.moveTo(
                        motorX - Math.cos(bladeAngle) * bladeLen,
                        motorY - Math.sin(bladeAngle) * bladeLen * 0.5
                    );
                    ctx.lineTo(
                        motorX + Math.cos(bladeAngle) * bladeLen,
                        motorY + Math.sin(bladeAngle) * bladeLen * 0.5
                    );
                    ctx.stroke();
                }

                // Propeller glow
                ctx.fillStyle = 'rgba(100, 200, 255, 0.15)';
                ctx.beginPath();
                ctx.ellipse(motorX, motorY, 8, 4, 0, 0, Math.PI * 2);
                ctx.fill();
            }

            // LED lights on front arms (for orientation)
            ctx.fillStyle = '#00ff00';
            ctx.beginPath();
            ctx.arc(x + Math.cos(armAngles[0]) * armLength, y + Math.sin(armAngles[0]) * armLength * 0.7, 2, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(x + Math.cos(armAngles[1]) * armLength, y + Math.sin(armAngles[1]) * armLength * 0.7, 2, 0, Math.PI * 2);
            ctx.fill();

            // Red LEDs on back arms
            ctx.fillStyle = '#ff0000';
            ctx.beginPath();
            ctx.arc(x + Math.cos(armAngles[2]) * armLength, y + Math.sin(armAngles[2]) * armLength * 0.7, 2, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(x + Math.cos(armAngles[3]) * armLength, y + Math.sin(armAngles[3]) * armLength * 0.7, 2, 0, Math.PI * 2);
            ctx.fill();

            // Altitude indicator
            ctx.fillStyle = '#fff';
            ctx.font = '9px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(`${altitude.toFixed(0)}m`, x, y - 18);

            // Target ID
            ctx.fillStyle = '#4ade80';
            ctx.font = 'bold 10px Arial';
            ctx.fillText(`T${simulation.target.id}`, x, y + 25);
        }

        // Simulation functions
        function toggleSimulation() {
            const btn = document.getElementById('sim-btn');

            if (simulation.running) {
                stopSimulation();
                btn.textContent = 'Start Simulation';
            } else {
                startSimulation();
                btn.textContent = 'Stop Simulation';
            }
        }

        function startSimulation() {
            simulation.running = true;
            simulation.startTime = Date.now();
            simulation.target = {
                id: 1,
                x: 20,
                y: 20,
                z: 100,
                rcs: 0.5
            };

            animateSimulation();
        }

        function stopSimulation() {
            simulation.running = false;
            if (simulation.animationId) {
                cancelAnimationFrame(simulation.animationId);
            }
        }

        function animateSimulation() {
            if (!simulation.running) return;

            const elapsed = Date.now() - simulation.startTime;
            const progress = Math.min(elapsed / simulation.duration, 1);

            // Spiral path: starts at (20, 20, 100), spirals down to (0, 0, 0)
            // Must match draw3DTarget: totalRotations = 4, so angle = progress * 4 * 2 * PI
            const totalRotations = 4;
            const angle = progress * totalRotations * 2 * Math.PI;
            const radius = 20 * (1 - progress);
            const z = 100 * (1 - progress);

            simulation.target.x = radius * Math.cos(angle);
            simulation.target.y = radius * Math.sin(angle);
            simulation.target.z = z;
            simulation.target.rcs = 0.5 + Math.random() * 0.1;  // Slight RCS variation

            // Update table
            updateTargetTable();

            // Redraw 3D scene
            draw3DScene();

            // Continue or reset
            if (progress < 1) {
                simulation.animationId = requestAnimationFrame(animateSimulation);
            } else {
                // Reset and restart
                setTimeout(() => {
                    if (simulation.running) {
                        simulation.startTime = Date.now();
                        animateSimulation();
                    }
                }, 2000);
            }
        }

        function updateTargetTable() {
            const target = simulation.target;
            document.getElementById('target-1-x').textContent = target.x.toFixed(1);
            document.getElementById('target-1-y').textContent = target.y.toFixed(1);
            document.getElementById('target-1-z').textContent = target.z.toFixed(1);
            document.getElementById('target-1-rcs').textContent = target.rcs.toFixed(2);
        }

        // Handle window resize for 3D canvas
        const originalHandleResize = handleResize;
        handleResize = function () {
            originalHandleResize();

            const canvas3D = document.getElementById('canvas-3d');
            if (canvas3D) {
                const container = canvas3D.parentElement;
                canvas3D.width = container.clientWidth;
                canvas3D.height = container.clientHeight;
                draw3DScene();
            }
        };

        // Initialize
        loadConfig();
    </script>
</body>

</html>
